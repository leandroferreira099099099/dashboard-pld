<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard PLD & FinCrime — Standalone</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f5f7fb;color:#111}
    header{background:#0f172a;color:#fff;padding:16px}
    main{padding:16px}
    .card{background:#fff;border-radius:8px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
    .kpi{background:#fff;border-radius:8px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .kpi .v{font-size:24px;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
    footer{opacity:.6;text-align:center;padding:16px}
  </style>
</head>
<body>
  <header>
    <h1>Dashboard PLD & FinCrime</h1>
    <p>Versão <strong>standalone</strong> (sem fetch, sem SharePoint, sem JSON)</p>
  </header>

  <main>
    <div class="kpis">
      <div class="kpi"><div class="v" id="k1">42</div><div>Total de Casos</div></div>
      <div class="kpi"><div class="v" id="k2">18</div><div>Abertos</div></div>
      <div class="kpi"><div class="v" id="k3">21</div><div>Concluídos</div></div>
      <div class="kpi"><div class="v" id="k4">3</div><div>COAF</div></div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Distribuição por Risco (mock)</h3>
        <canvas id="c1" height="120"></canvas>
      </div>
      <div class="card">
        <h3>Status (mock)</h3>
        <canvas id="c2" height="120"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Tabela (mock)</h3>
      <table width="100%" cellpadding="8" cellspacing="0" border="1" style="border-collapse:collapse">
        <thead><tr><th>ID</th><th>Tipo</th><th>Status</th><th>Risco</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <footer>Somente para teste visual no GitHub Pages</footer>

  <!-- External CDN is OK; there is NO local file reference and NO fetch -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script>
    // Mock data embedded inline (no external loads)
    const data = [
      {id:'RP-1001', tipo:'Alerta PLD', status:'Novo', risco:'Alto'},
      {id:'RP-1002', tipo:'KYP', status:'Em análise', risco:'Médio'},
      {id:'RP-1003', tipo:'Manipulação', status:'Concluído', risco:'Alto'},
      {id:'RP-1004', tipo:'Jogo Responsável', status:'Concluído', risco:'Baixo'}
    ];

    // Fill table
    const tb = document.getElementById('tbody');
    data.forEach(r=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${r.id}</td><td>${r.tipo}</td><td>${r.status}</td><td>${r.risco}</td>`;
      tb.appendChild(tr);
    });

    // Charts (inline data)
    new Chart(document.getElementById('c1'),{
      type:'bar',
      data:{labels:['Alto','Médio','Baixo'],datasets:[{data:[2,1,1],backgroundColor:['#ef4444','#f59e0b','#22c55e']}]} ,
      options:{plugins:{legend:{display:false}}}
    });

    new Chart(document.getElementById('c2'),{
      type:'bar',
      data:{labels:['Novo','Em análise','Concluído'],datasets:[{data:[1,1,2],backgroundColor:['#3b82f6','#eab308','#22c55e']}]} ,
      options:{plugins:{legend:{display:false}}}
    });
  </script>
</body>
</html>
